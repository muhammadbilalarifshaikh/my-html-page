<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TT Copper – 1KG 99.99% Pure</title>

<style>

/* ===================================== */
/* GLOBAL BODY SETTINGS */
/* ===================================== */
body {
    margin: 0;
    background: radial-gradient(circle at center, #1b1b1b 0%, #000 80%);
    min-height: 100vh; /* allow scroll on mobile */
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow-x: hidden; /* prevent sideways scroll */
}

/* ===================================== */
/* TOP TITLE */
/* ===================================== */
h1 {
    margin-top: 25px;
    text-align: center;
    letter-spacing: 2px;
    font-weight: 400;
    font-size: clamp(14px, 4vw, 18px); /* responsive font */
    opacity: 0.85;
}

/* ===================================== */
/* 3D SCENE CONTAINER */
/* ===================================== */
.scene {
    margin-top: 40px;
    width: 90vw;              /* responsive width */
    max-width: 520px;         /* limit for desktop */
    height: 200px;
    perspective: 1100px;      /* less distortion */
    display: flex;
    justify-content: center;
}

/* ===================================== */
/* MAIN 3D BAR */
/* ===================================== */
.bar {
    width: 50vw;
    max-width: 360px;
    height: 300px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(15deg) rotateY(0deg);
    animation: showroomRotate 18s infinite linear;
    transition: transform 0.1s ease-out;
}

/* Auto rotation */
@keyframes showroomRotate {
    from { transform: rotateX(15deg) rotateY(0deg); }
    to { transform: rotateX(15deg) rotateY(360deg); }
}

/* ===================================== */
/* BAR FACES */
/* ===================================== */
.face {
    position: absolute;
    border-radius: 12px;

    /* Copper gradient */
    background: linear-gradient(
        145deg,
        #ffb37a 0%,
        #e69149 25%,
        #c8752c 55%,
        #8a4a20 80%
    );

    box-shadow:
        inset -15px -15px 35px rgba(0,0,0,0.5),
        inset 15px 15px 35px rgba(255,255,255,0.25),
        0 20px 40px rgba(0,0,0,0.9);
}

/* FRONT & BACK */
.front, .back {
    width: 100%;
    height: 100%;
    transform: translateZ(40px);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BACK FACE */
.back {
    transform: rotateY(180deg) translateZ(40px);
}

/* TOP */
.top {
    width: 100%;
    height: 70px;
    transform: rotateX(90deg) translateZ(40px);
}

/* BOTTOM */
.bottom {
    width: 100%;
    height: 70px;
    transform: rotateX(-90deg) translateZ(270px);
}

/* LEFT */
.left {
    width: 70px;
    height: 100%;
    transform: rotateY(-90deg) translateZ(40px);
}

/* RIGHT */
.right {
    width: 70px;
    height: 100%;
    transform:rotateY(-90deg) translateZ(-280px);
}

/* ===================================== */
/* ENGRAVED TEXT */
/* ===================================== */
.engraving {
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5a2c0c;
    user-select: none;
    pointer-events: none;

    text-shadow:
        1px 1px 2px #fbd3b5,
        -1px -1px 2px #6d3716,
        3px 3px 10px rgba(0,0,0,0.8);
}

.engraving h2 {
    margin: 4px 0;
    font-size: clamp(15px, 4vw, 22px);
}

.engraving p {
    margin: 3px 0;
    font-size: clamp(11px, 3vw, 14px);
}

/* ===================================== */
/* REFLECTION GLOW */
/* ===================================== */
.reflection {
    margin-top: 20px;
    width: 60vw;
    max-width: 280px;
    height: 70px;
    background: radial-gradient(ellipse at center, rgba(255,140,60,0.4) 0%, transparent 75%);
    filter: blur(25px);
}

/* ===================================== */
/* RATES BOX */
/* ===================================== */
.rates {
    margin-top: 35px;
    width: 90vw;
    max-width: 420px;
    background: rgba(15,15,15,0.95);
    padding: 18px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
    font-size: clamp(13px, 3.5vw, 16px);
    box-shadow: 
        0 0 30px rgba(255,140,60,0.25),
        inset 0 0 15px rgba(255,140,60,0.05);
    border: 1px solid rgba(255,140,60,0.2);
}

.rates table {
    width: 100%;
    border-collapse: collapse;
    color: #ffbf91;
}

.rates td {
    padding: 8px 5px;
}

.rates tr:not(:last-child) td {
    border-bottom: 1px solid rgba(255,140,60,0.15);
}

/* ===================================== */
/* FOOTER */
/* ===================================== */
footer {
    margin: 40px 0 20px 0;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.7;
    text-align: center;
}

</style>
</head>

<body>

<h1>TT COPPER – Investment Grade Bullion</h1>

<div class="scene">
    <div class="bar" id="bar">

        <div class="face front">
            <div class="engraving">
                <h2>TT COPPER</h2>
                <h2>99.99% PURE</h2>
                <p>1 KILOGRAM</p>
                <p>ULTRA REFINED</p>
            </div>
        </div>

        <div class="face back">
            <div class="engraving">
                <h2>TT COPPER</h2>
                <h2>99.99% PURE</h2>
                <p>1 KILOGRAM</p>
                <p>ULTRA REFINED</p>
            </div>
        </div>

        <div class="face top"></div>
        <div class="face bottom"></div>
        <div class="face left"></div>
        <div class="face right"></div>

    </div>
</div>

<div class="reflection"></div>

<div class="rates">
    <table>
        <tr>
            <td>Premium Copper (USD/lb)</td>
            <td id="usdPrice">$12.09</td>
        </tr>
        <tr>
            <td>Converted PKR/kg</td>
            <td id="pkrRate">Rs 7500</td>
        </tr>
        <tr>
            <td>Ultra Premium Physical (PKR/kg)</td>
            <td id="premiumRate">Rs 9750</td>
        </tr>
    </table>
</div>

<footer>Authenticity • Purity • Trust</footer>

<script>
// (Your existing JS can stay here — unchanged)
</script>

</body>
</html>
